<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button{
            width: 100px;
            height: 30px;
            transition: all 0.3s ease-in-out;
            transform: translate(50px,25px);
        }
        button:hover{
            transform: scale(1.3);
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 10px;
        }
        .button{
            width: 200px;
            height: 80px;
            background-color: lightpink;
            
        }
    </style>
</head>
<body>
    <div class="button">
        <button>Click oun mk</button>
        
    </div>
</body>
</html>
