<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap');
        body{
            font-family: "Bricolage Grotesque", sans-serif;
            
            background-color: rgb(226, 202, 243);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .outer{
            box-sizing: border-box;
            background-color: rgb(243, 238, 244);
            border: 2px solid rgb(243, 238, 244);
            border-radius: 5px;
            width: 380px;
            height: 440px;
            padding: 40px;
        }
        .name{
            font-size: 25px;
            font-weight: bold;
            color: rgb(98, 16, 174);
            
        }
        .text{
            display: flex;
            font-size: small;
            color: rgb(135, 124, 138);
            margin-top: 10px;
        
        }
        .imgage{
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            
        }
        .icon{
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .purplee .purple{
        
            display: flex;
            background-color: rgb(207, 5, 207);
            width: 15px;
            height: 15px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
        }
        .purplee{
            margin-right: 15px;
            padding: 1px;
            box-sizing: border-box;
            border: 2px solid purple;
            border-radius: 50%;
            width:21px;
            height: 10%;
        }
        .blue{
            margin-right: 15px;
            display: flex;
            background-color: rgb(0, 157, 255);
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
        .black{
            margin-right: 15px;
            display: flex;
            background-color: rgb(52, 49, 49);
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
        .red{
            display: flex;
            background-color: rgb(255, 20, 20);
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
        .price{
            display: flex;
            margin-top: -5px;
        }
        .money{
            color: rgb(98, 16, 174);
            margin-top: 50px;
            font-size: large;
            
        }
        .button{
            margin-left: 140px;
            margin-top: 40px;
            padding: 10px;
            border-radius: 50px;
            margin-top: 40px;
            border-color: rgb(98, 16, 174);
            color: rgb(98, 16, 174);
        }
    </style>

</head>
<body>
    <div class="outer">
        <div class="header">
            <span class="name">ORIGINAL COLOR SHOES</span>
            <span class="text">SHOES WITH DIFFERENT COLOR AND BACKGROUND</span>
        </div>
        <div class="img">
            <img class="imgage" src="shoes1.png" alt="">
        </div>
        <div class="icon">    
          <div class="purplee">
             <span class="purple"></span>
          </div>
           <span class="blue"></span>
           <span class="black"></span>
           <span class="red"></span>
        </div>
        <div class="price">
            <span class="money">$168</span>
            <button class="button">ADD TO CART</button>
        </div>

    </div>
</body>
</html>
