<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .container{
            width: 100px;
            height: 50px;
            
        }
        button{
            width: 100%;
        }
        .container:hover .link{
            height: 100px;
        }
        .link{
            width: 100%;
            height: 0;
            overflow: hidden;
            transition: all 0.3s ease-in-out;
            background-color: lightcoral;
        }
        .link a{
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <button>Select Options</button>
        <div class="link">
            <a href="#">TikTok</a>
            <a href="#">YouTube</a>
            <a href="#">Messenger</a>
        </div>
    </div>
   
</body>
</html>
