<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .box{
        margin-bottom: 200px;
        width: 100px;
        height: 100px;
        background-color: lightcoral;
        transition: all 0.3s ease-in-out 1s;
        transition: property duration timing-function delay; 
        border-radius: 0 0 30px 0;
        box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
    }
    .box:hover{
        background-color: lightblue;
    }
    .line{
        width: 100px;
        height: 30px;
        background-color: antiquewhite;
        animation: line 1s ease-in-out infinite alternate;
    }
    @keyframes line {
        from{
            width: 0%;
            height: 0%;
            background-color: lightgreen;
        } to {
            width: 100%;
            height: 100%;
            border-radius: 0 0 30px 0;
            background-color: rgb(26, 44, 205);
        }
    }
    .box1{
        width: 100px;
        height: 100px;
        background-color: rgb(0, 0, 0);
        position: relative;
        top: 50px;
        right: 100px;
        box-shadow: rgba(0, 0, 0, 0.56) 0px 22px 70px 4px;  
        
    }
    .line1{
        position: absolute;
        width: 20px;
        height: 20px;
        background-color: rgb(226, 4, 4);
        animation: line1 1s ease-in-out infinite;
        border-radius: 50%;
    }
    @keyframes line1 {
        0%{
            top: 0;
            left: 0;
        }
        25%{
            top: 0;
            left: calc(100% - 20px);
        }
        50%{
            top: calc(100% - 20px);
            left: calc(100% - 20px);
        }
        75%{
            top: calc(100% - 20px);
            left: 0;
        }
        100%{
            left: 0;
            top: 0;
        }
    }
</style>
<body>
    <div class="box">
        <div class="line"></div>
    </div>
    <div class="box1">
        <div class="line1"></div>
    </div>
</body>
</html>
