<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .DIV{
            background-color: rgb(71, 56, 56);
            width: 390px;
            height: 500px;
            border-radius: 40px;
        }
        
        .img{
            display: flex;
            width: 97%;
            height: 300px;
            margin: 5px 5px 0px 5.5px;
            border-radius: 30px;
            object-fit: cover;
        }
        .text{
            color: antiquewhite;
            margin-left: 30px;
            margin-top: 20px;
        }
        .icon{
            margin-left: 30px;
            margin-top: 25px;
            display: flex;
            color: antiquewhite;
            font-size: 18px;
        }
        .icon .a{
            margin-top: 7px;
            display: flex;
            font-size: 25px;
            margin-right: 5px;
            color: antiquewhite;
            text-decoration: none;
            
        }
        .icon .num{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .icon .button{
            margin-left: 90px;
            font-size: 18px;
            text-align: center;
            padding: 5px 10px;
            width: 110px;
            height: 40px;
            border-radius: 30px;
            color: antiquewhite;
            border-color: antiquewhite;
            background-color: transparent;
        }


       
        
        
        

    </style>
</head>

<body>
    <div class="DIV">
        <div class="img">
            <img class="img" src="https://i.pinimg.com/736x/4d/54/c3/4d54c3c444ff7694708e6ea1646b54b8.jpg" alt="">
        </div>
        <div class="text">
            <h1 class="h">Ronaldo</h1>
            <p class="p">Lionel Messi is a legendary footballer known for dribbling, goals, and winning the 2022 World Cup.</p>
        </div>
        <div class="icon">
            <a href="#" class="a">
                <i class='bx bxs-user' ></i>
            </a>
            <label for="" class="num">267K followers</label>
            <button class="button">Follow +</button>
        </div>
    </div>


   
</body>
</html>
