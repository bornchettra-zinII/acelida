<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body style="background-color: rgb(247, 134, 114);">

        <div style="text-align: center; margin-top: 20px;">
            <img style="width: 50px;" src="wavbe.png" alt="">
            <h1 style="position: relative; top: -20px;">Login</h1>
        </div>
        <div style="margin: 20px;">
            <span><b>Email</b></span><br>
            <input type="email" style="height: 40px; width: 98%; text-indent: 30px; font-size: large;"  placeholder="username@gmail.com "><br><br>
            <span ><b>Password</b></span><br>
            <input type="password" style="height: 40px; width: 98%;  " >

                <br><br>    
                <div style="display: flex; align-items: center; width: 98%;">

                <span style="margin: 0 10px;">or</span>
                <hr style="flex: 1;">
                </div><br><br>
                <div style="margin-top: -20px;">
                    <button style="display: flex; align-items: center; 
                        width: 100%; height: 45px; justify-content: center;
                        "><img style="width: 30px;" src="google.png" alt=""><span style="text-indent: 20px; font-size: medium;">Continue with Google</span></button>
                </div>
            </div>
        </div>
    </div>
