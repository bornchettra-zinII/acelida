<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="margin: 30px; border: 2px solid black; width: 500px; background-color: rgb(248, 231, 121); overflow: auto;">
        <h1 style="text-align: center;">Login Form</h1>
        <div style="margin-left: 20px;">
        <h3>Welcome</h3>
        <p style="position: relative; top: -15px;">Login to get started!</p>
            <form action="" style="position: relative; top: -15px;">
                <span>Email</span><br>
                <input style="height: 20px ; width: 200px;" type="email" placeholder="username@gmail.com"><br><br>
                <span>Password</span><br>
                <input style="height: 20px; width: 200px;" type="password" placeholder="enter password number"><br><br>
            </form>
            <input style="position: relative; top: -27px;" type="checkbox">
            <span style="position: relative; top: -27px;">Remember me</span>
            </div>
            <div style="text-align: center; top: -10px; ">
            <button style="width: 150px;  height: 30px; margin-bottom: 2px;" type="submit">Login</button>
            <button style="width: 150px;  height: 30px;" type="submit ">Forget Password</button>
            </div>
            <div style="margin-left: 20px; display: flex; align-items: center;">
                <img style="width: 25px; float: left;" src="google.png" alt="">
                <a style="font-size: smaller;" href="https://www.youtube.com/watch?v=4YBGRGBj7_w">Sign in with google</a>
                
                <p style="font-size: smaller; margin-left: 100px; ">Don't have account? <a href="https://youtu.be/UqKFp_36Xmc?si=Pz4mw1lWf6kpWOYH">Create your account</a></p>
            </div>
    </div>
</body>
</html>
