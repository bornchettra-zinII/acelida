<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khmerness-Cake</title>
    <link rel="stylesheet" href="css/bootstrap.css" />
    <link rel="stylesheet" href="css/bootstrap-grid.css" />
    <link rel="stylesheet" href="css/custom.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <style>
    .navbar-custom {
      background: linear-gradient(To right, #e6cd0f, #c0b824);
      padding: 10px 0;
      border-bottom: 3px solid gold;
    }
    .navbar-brand {
      color: #ffd700 !important;
      font-weight: bold;
      font-size: 20px;
    }
    .nav-link {
      color: white !important;
      margin: 0 10px;
      transition: 0.3s;
    }
    .nav-link.nav-link:hover {
      color: #ffd700 !important;
    }
    .card-icon {
      color: white;
      font-size: 20px;
      margin-left: 15px;
      cursor: pointer;
    }
    .card-icon:hover {
      color: #ffd700;
    }
    .btn {
      background: lightgoldenrodyellow;
    }
  </style>

  <body>
    <!-- header of website -->
    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <!-- Logo -->
        <a class="navbar-brand" href="#">
          <img src="photo/image.png" width="150" alt="Khmerness Cake" />
        </a>

        <!-- Toggle -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- Center Menu -->
          <ul class="navbar-nav mx-auto text-center">
            <li class="nav-item">
              <a class="nav-link active" href="#">ទំព័រដើម</a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                data-bs-toggle="dropdown"
              >
                ប្រភេទទំនិញ
              </a>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Khmer Cake</a></li>
                <li><a class="dropdown-item" href="#">American Bread</a></li>
                <li><a class="dropdown-item" href="#">Italian Bread</a></li>
                <li><a class="dropdown-item" href="#">Chinese Cake</a></li>
              </ul>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">តំណរភ្ជាប់</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="#">ទំនាក់ទំនង</a>
            </li>
          </ul>

          <!-- Right Side (Button like your design) -->
          <div class="d-flex align-items-center">
            <button class="btn">Order Now</button>
          </div>
        </div>
      </div>
    </nav>
    <div
      id="carouselExampleInterval"
      class="carousel slide"
      data-bs-ride="carousel"
    >
      <div class="carousel-inner">
        <div class="carousel-item active" data-bs-interval="10000">
          <img
            src="photo/photo_2026-03-30_19-06-18.jpg"
            class="d-block w-100"
            alt="phot0"
          />
        </div>
        <div class="carousel-item" data-bs-interval="2000">
          <img
            src="photo/photo_2026-03-30_19-35-47.jpg"
            class="d-block w-100"
            alt="photo"
          />
        </div>
        <div class="carousel-item">
          <img
            src="photo/photo_2026-03-30_19-35-50.jpg"
            class="d-block w-100"
            alt="photo"
          />
        </div>
      </div>
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carouselExampleInterval"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carouselExampleInterval"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
    <!-- Start contain of website -->
    <div class="contant"></div>
      

    <!-- End of website -->
    <footer></footer>

    <script src="assets/js/bootstrap.js"></script>
    <script src="assets/js/bootstrap.bundle.js"></script>
  </body>
</html>
